name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - run: dotnet publish AccessTreeView.slnx -c Release -o publish

      - name: Create release archive
        shell: pwsh
        run: Compress-Archive -Path publish/*.dll -DestinationPath AccessTreeView-${{ github.ref_name }}.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: AccessTreeView-${{ github.ref_name }}.zip
          generate_release_notes: true
